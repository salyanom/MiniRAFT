version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080" # WebSockets and frontend access
    networks:
      - raft-network
    depends_on:
      - replica1
      - replica2
      - replica3

  replica1:
    build: ./replica1
    environment:
      - REPLICA_ID=1
      - PORT=3000
    ports:
      - "3001:3000"
    volumes:
      - ./replica1:/app # Bind mount for hot-reload
    networks:
      - raft-network

  replica2:
    build: ./replica2
    environment:
      - REPLICA_ID=2
      - PORT=3000
    ports:
      - "3002:3000"
    volumes:
      - ./replica2:/app
    networks:
      - raft-network

  replica3:
    build: ./replica3
    environment:
      - REPLICA_ID=3
      - PORT=3000
    ports:
      - "3003:3000"
    volumes:
      - ./replica3:/app
    networks:
      - raft-network

networks:
  raft-network:
    driver: bridge # Shared Docker network